<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>業務問題回報系統</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 預載 Lucide 圖示
        const Icon = ({ name, className }) => {
            const [svg, setSvg] = useState('');
            useEffect(() => {
                if (window.lucide) {
                    const iconNode = window.lucide.icons[name];
                    if (iconNode) {
                        // 簡單模擬 lucide-react 的行為
                    }
                }
            }, [name]);
            // 為了簡化，在 HTML 版直接使用 SVG 路径或 Lucide createIcons
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyOpM_GHYHNNCywVzvoKCfLbWyd4H4J0lbe2p5jNEDT0QtJVA2xaYD_mTLfsF6_-D8/exec";

            const [formData, setFormData] = useState({
                salesName: '', language: '', level: '', volume: '', description: ''
            });
            const [reports, setReports] = useState([]);
            const [status, setStatus] = useState('idle');

            useEffect(() => {
                lucide.createIcons();
            }, [status, reports]);

            const languages = ['閩南語', '客語'];
            const levels = ['國小', '國中', '高中'];
            const getVolumeOptions = (level) => {
                if (level === '國小') return Array.from({ length: 12 }, (_, i) => `第 ${i + 1} 冊`);
                if (level === '國中' || level === '高中') return Array.from({ length: 6 }, (_, i) => `第 ${i + 1} 冊`);
                return [];
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setStatus('submitting');
                const newReport = { ...formData, id: Date.now(), timestamp: new Date().toLocaleString('zh-TW') };
                
                try {
                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(newReport)
                    });
                    setReports([newReport, ...reports]);
                    setStatus('success');
                    setFormData({ ...formData, language: '', level: '', volume: '', description: '' });
                    setTimeout(() => setStatus('idle'), 3000);
                } catch (error) {
                    setStatus('error');
                    setTimeout(() => setStatus('idle'), 5000);
                }
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-4xl mx-auto">
                        <header className="mb-8 text-center">
                            <h1 className="text-3xl font-bold text-indigo-700 flex items-center justify-center gap-2">
                                <i data-lucide="database"></i> 業務問題回報系統
                            </h1>
                            <p className="text-slate-500 mt-2">雲端同步服務已就緒 (Google Sheets)</p>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-5 gap-8">
                            <div className="lg:col-span-3">
                                <div className="bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden">
                                    <div className="bg-indigo-600 p-5 text-white font-semibold flex items-center gap-2">
                                        <i data-lucide="message-square"></i> 新回報單
                                    </div>
                                    <form onSubmit={handleSubmit} className="p-8 space-y-6">
                                        <div className="space-y-2">
                                            <label className="text-sm font-bold text-slate-700">業務名稱</label>
                                            <input type="text" required value={formData.salesName} onChange={e => setFormData({...formData, salesName: e.target.value})} className="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none focus:border-indigo-500 transition-all" placeholder="請輸入姓名" />
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="space-y-2">
                                                <label className="text-sm font-bold text-slate-700">語種</label>
                                                <select required value={formData.language} onChange={e => setFormData({...formData, language: e.target.value})} className="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white">
                                                    <option value="">選擇</option>
                                                    {languages.map(l => <option key={l} value={l}>{l}</option>)}
                                                </select>
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-sm font-bold text-slate-700">學制</label>
                                                <select required value={formData.level} onChange={e => setFormData({...formData, level: e.target.value, volume: ''})} className="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white">
                                                    <option value="">選擇</option>
                                                    {levels.map(l => <option key={l} value={l}>{l}</option>)}
                                                </select>
                                            </div>
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-sm font-bold text-slate-700">冊別</label>
                                            <select required disabled={!formData.level} value={formData.volume} onChange={e => setFormData({...formData, volume: e.target.value})} className="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white disabled:bg-slate-50">
                                                <option value="">選擇冊別</option>
                                                {getVolumeOptions(formData.level).map(v => <option key={v} value={v}>{v}</option>)}
                                            </select>
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-sm font-bold text-slate-700">問題內容</label>
                                            <textarea rows="3" value={formData.description} onChange={e => setFormData({...formData, description: e.target.value})} className="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none focus:border-indigo-500 transition-all" placeholder="詳細描述..."></textarea>
                                        </div>
                                        <button type="submit" disabled={status === 'submitting'} className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2">
                                            {status === 'submitting' ? '同步中...' : '提交至雲端'}
                                        </button>
                                    </form>
                                </div>
                                {status === 'success' && <div className="mt-4 p-4 bg-emerald-50 text-emerald-700 rounded-xl border border-emerald-100 flex items-center gap-2">回報成功！已存入試算表。</div>}
                            </div>
                            <div className="lg:col-span-2">
                                <div className="bg-white rounded-3xl shadow-sm border border-slate-100 h-full overflow-hidden flex flex-col">
                                    <div className="p-5 border-b font-bold flex items-center gap-2"><i data-lucide="history"></i> 本機紀錄</div>
                                    <div className="p-5 space-y-4 overflow-y-auto max-h-[500px]">
                                        {reports.length === 0 ? <p className="text-slate-300 text-center py-10">尚無紀錄</p> : 
                                            reports.map(r => (
                                                <div key={r.id} className="p-4 rounded-xl bg-slate-50 border border-slate-100">
                                                    <div className="text-[10px] text-indigo-600 font-bold mb-1">{r.language} | {r.timestamp}</div>
                                                    <div className="font-bold text-slate-800">{r.level} - {r.volume}</div>
                                                    <div className="text-xs text-slate-500 mt-1">回報人：{r.salesName}</div>
                                                </div>
                                            ))
                                        }
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
