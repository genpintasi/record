<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>業務問題回報系統 - 正式版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            // =========================================================
            // 【重要】請確認下方的網址與您測試成功的網址完全一致
            // =========================================================
            const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz2UHwtUwpZ8gUdb4wJsEib_W191kFo-siPSBDQUTdp54tmFalCn0kWF0y4jpeVC1I/exec";

            const [formData, setFormData] = useState({
                salesName: '', language: '', level: '', volume: '', description: ''
            });
            const [reports, setReports] = useState([]);
            const [status, setStatus] = useState('idle');

            useEffect(() => {
                if (window.lucide) lucide.createIcons();
            }, [status, reports]);

            const languages = ['閩南語', '客語'];
            const levels = ['國小', '國中', '高中'];
            const getVolumeOptions = (level) => {
                if (level === '國小') return Array.from({ length: 12 }, (_, i) => `第 ${i + 1} 冊`);
                if (level === '國中' || level === '高中') return Array.from({ length: 6 }, (_, i) => `第 ${i + 1} 冊`);
                return [];
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setStatus('submitting');
                
                const newReport = { 
                    salesName: formData.salesName,
                    language: formData.language,
                    level: formData.level,
                    volume: formData.volume,
                    description: formData.description
                };
                
                try {
                    // 送出資料到 Google
                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(newReport)
                    });

                    // 成功後更新本機清單並清空表單
                    setReports([{ ...newReport, id: Date.now(), timestamp: new Date().toLocaleString() }, ...reports]);
                    setStatus('success');
                    setFormData(prev => ({ ...prev, language: '', level: '', volume: '', description: '' }));
                    setTimeout(() => setStatus('idle'), 3000);
                } catch (error) {
                    setStatus('error');
                    setTimeout(() => setStatus('idle'), 5000);
                }
            };

            return (
                <div className="min-h-screen p-4 md:p-8 flex justify-center items-start">
                    <div className="w-full max-w-4xl">
                        <header className="mb-8 text-center">
                            <h1 className="text-3xl font-bold text-slate-800">業務問題回報系統</h1>
                            <div className="mt-2 flex items-center justify-center gap-2 text-emerald-600 font-medium">
                                <i data-lucide="cloud-check" className="w-4 h-4"></i>
                                雲端資料庫已連線
                            </div>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-5 gap-8">
                            <div className="lg:col-span-3">
                                <div className="bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden">
                                    <div className="bg-indigo-600 p-5 text-white font-bold flex items-center gap-2">
                                        <i data-lucide="pen-tool"></i> 填寫資料
                                    </div>
                                    <form onSubmit={handleSubmit} className="p-8 space-y-6">
                                        <div>
                                            <label className="block text-sm font-bold text-slate-700 mb-2">業務姓名</label>
                                            <input required type="text" value={formData.salesName} onChange={e => setFormData({...formData, salesName: e.target.value})} className="w-full px-4 py-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="輸入姓名" />
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-sm font-bold text-slate-700 mb-2">語種</label>
                                                <select required value={formData.language} onChange={e => setFormData({...formData, language: e.target.value})} className="w-full px-4 py-3 bg-slate-50 border-none rounded-xl outline-none">
                                                    <option value="">選擇</option>
                                                    {languages.map(l => <option key={l} value={l}>{l}</option>)}
                                                </select>
                                            </div>
                                            <div>
                                                <label className="block text-sm font-bold text-slate-700 mb-2">學制</label>
                                                <select required value={formData.level} onChange={e => setFormData({...formData, level: e.target.value, volume: ''})} className="w-full px-4 py-3 bg-slate-50 border-none rounded-xl outline-none">
                                                    <option value="">選擇</option>
                                                    {levels.map(l => <option key={l} value={l}>{l}</option>)}
                                                </select>
                                            </div>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold text-slate-700 mb-2">冊別</label>
                                            <select required disabled={!formData.level} value={formData.volume} onChange={e => setFormData({...formData, volume: e.target.value})} className="w-full px-4 py-3 bg-slate-50 border-none rounded-xl outline-none disabled:opacity-50">
                                                <option value="">選擇冊別</option>
                                                {getVolumeOptions(formData.level).map(v => <option key={v} value={v}>{v}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold text-slate-700 mb-2">回報內容</label>
                                            <textarea rows="3" value={formData.description} onChange={e => setFormData({...formData, description: e.target.value})} className="w-full px-4 py-3 bg-slate-50 border-none rounded-xl outline-none" placeholder="描述問題..."></textarea>
                                        </div>
                                        <button type="submit" disabled={status === 'submitting'} className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg flex items-center justify-center gap-2 transition-all active:scale-95">
                                            {status === 'submitting' ? <i data-lucide="loader-2" className="animate-spin w-5 h-5"></i> : <i data-lucide="send" className="w-5 h-5"></i>}
                                            {status === 'submitting' ? '傳送中...' : '提交回報單'}
                                        </button>
                                    </form>
                                </div>
                                {status === 'success' && <div className="mt-4 p-4 bg-emerald-100 text-emerald-700 rounded-xl flex items-center gap-2 font-bold animate-bounce">成功送達雲端試算表！</div>}
                            </div>
                            <div className="lg:col-span-2">
                                <div className="bg-white rounded-3xl shadow-sm border border-slate-100 h-[500px] flex flex-col overflow-hidden">
                                    <div className="p-5 border-b font-bold text-slate-700 flex items-center gap-2"><i data-lucide="history"></i> 本次紀錄</div>
                                    <div className="p-5 overflow-y-auto space-y-4">
                                        {reports.length === 0 ? <p className="text-slate-300 text-center py-20">尚未有送出紀錄</p> : 
                                            reports.map(r => (
                                                <div key={r.id} className="p-4 rounded-2xl bg-slate-50 border border-slate-100">
                                                    <div className="text-[10px] font-bold text-indigo-500">{r.language}</div>
                                                    <div className="font-bold">{r.level} · {r.volume}</div>
                                                    <div className="text-xs text-slate-400 mt-1">{r.timestamp}</div>
                                                </div>
                                            ))
                                        }
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
